# fly.toml — Fly.io deployment for the salary-management backend.
#
# Originally written by hand; `fly launch` regenerated this file when first deploying.
# Manually corrected after regeneration:
#   - internal_port reset to 8000 (matches the Dockerfile's `uvicorn --port 8000`).
#   - grace_period bumped to 30s (Python web apps need >5s cold-start headroom for the
#     Pydantic model build + SQLAlchemy engine init + Base.metadata.create_all).
#
# Deploy:
#   cd backend && fly deploy

app = 'salary-management-incubyte'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'sqlite:////data/app.db'

[[mounts]]
  source = 'salary_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
